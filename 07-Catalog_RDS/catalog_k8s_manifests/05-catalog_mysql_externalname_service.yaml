# catalog service uses externalname service to connect to RDS.

# externalname service - maps a dns entry inside the cluster to an external endpoint (RDS)

# secrets stored in aws secret manager need to store credentials for rds db


apiVersion: v1
kind: Service
metadata:
  name: catalog-mysql
spec:
  type: ExternalName
  externalName: mydb101.c4fcawcuw766.us-east-1.rds.amazonaws.com
  ports:
    - port: 3306
